{% extends 'store/base.html' %}

{% block title %}File Viewer - TOEBEANS{% endblock %}

{% block content %}
<div style="max-width: 1200px; margin: 0 auto; padding: 30px 20px;">
    <a href="{% url 'shop' %}" style="color: #000; text-decoration: none; margin-bottom: 20px; display: inline-block;">← Back to Shop</a>

    {% if error %}
    <div style="background: #f8d7da; padding: 15px; border-radius: 4px; color: #721c24; margin-bottom: 20px;">
        <strong>Error:</strong> {{ error }}
    </div>
    {% endif %}

    {% if content %}
    <div style="background: #f5f5f5; padding: 15px; border-radius: 4px; border: 1px solid #ddd; margin-top: 20px;">
        <pre style="white-space: pre-wrap; word-break: break-word; background: #222; color: #f8f8f2; padding: 15px; border-radius: 4px; overflow-x: auto;">{{ content }}</pre>
    </div>
    {% endif %}
</div>
{% endblock %}
